<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/recursos/icon.ico" />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/e522357059.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <title>CapyPanel</title>
  </head>
  <body>
    <div class="capy-wrapper" data-aos="fade-down">
      <img
        class="add-button"
        id="add-button"
        src="recursos/capy2r.png"
        alt="capybara"
      />
      <img
        class="reverse"
        id="reverse"
        src="recursos/capy2.png"
        alt="takataka"
        onclick="openFormComment()"
      />
    </div>
    <div class="div-text" id="label-message">
      <p class="texto" data-aos="fade-down">Presiona el Capybara</p>
      <img src="recursos/dedo.png" alt="dedo" data-aos="fade-down" />
    </div>
    <!-- card para input -->
    <div id="card" class="card">
      <div class="card-content">
        <h1>Deja tu comentario</h1>
        <form id="form">
          <input
            type="text"
            class="nameInput"
            id="nameInput"
            name="name"
            placeholder="Introduce tu nombre"
            required
          />
          <input
            type="text"
            class="commentInput"
            id="commentInput"
            name="comment"
            placeholder="¿Qué te parecieron las presentaciones?"
            required
          />
          <div class="buttons">
            <button type="submit" class="submit">Enviar</button>
            <button type="button" class="cancel" id="cancel">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <!--Modal para el mensaje "Aquí no, el capybara"-->
    <div class="modal">
        <span class="close">&times;</span>
        <div class="modal-content">
            <h2 class="modal-title">AQUÍ NO, EL CAPYBARA :)</h2>
        </div>
    </div>

    <!-- Panel de estadísticas -->
    <div class="stats-panel" id="stats-panel" data-aos="fade-right">
      <h2 class="panel-title">CapyPanel</h2>
      <div class="stat-row">
        <span class="stat-label">Comentarios</span>
        <span class="stat-value" id="panel-total">0</span>
      </div>
      <div class="stat-row stat-row--col">
        <span class="stat-label">Rating general</span>
        <div class="panel-stars" id="panel-rating">
          <i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
        </div>
        <span class="rating-avg" id="panel-avg">—</span>
      </div>
      <div class="best-section">
        <div class="best-label">&#127942; Mejor comentario</div>
        <div class="best-text" id="panel-best-text">Aún no hay comentarios.</div>
        <div class="best-author" id="panel-best-author"></div>
      </div>
    </div>

    <!-- Indicador de carga de IA -->
    <div class="ai-loading" id="ai-loading">
      <div class="spinner"></div>
      Cargando modelo IA...
    </div>

    <script src="script.js"></script>
    <script type="module">
      import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers/dist/transformers.min.js";

      try {
        // Modelo multilingüe con escala directa de 1 a 5 estrellas
        const analyzer = await pipeline(
          "text-classification",
          "Xenova/bert-base-multilingual-uncased-sentiment"
        );
        window.onAiReady(async (commentText) => {
          const result = await analyzer(commentText);
          // Labels: "1 star", "2 stars", "3 stars", "4 stars", "5 stars"
          const stars = parseInt(result[0].label.charAt(0));
          return Math.min(Math.max(stars, 1), 5);
        });
      } catch {
        // Fallback al modelo binario si el multilingüe no carga
        const analyzer = await pipeline("sentiment-analysis");
        window.onAiReady(async (commentText) => {
          const result = await analyzer(commentText);
          const label = result[0].label;
          const score = result[0].score;
          const stars = label === "POSITIVE"
            ? 3 + Math.round(score * 2)
            : 1 + Math.round(score * 2);
          return Math.min(Math.max(stars, 1), 5);
        });
      }
      document.getElementById("ai-loading").classList.add("hidden");
    </script>
  </body>
</html>

<!--
PENDIENTES:

-DAR ESTILOS AL MODAL
-MEJORAR RAITING DE COMENTARIOS (QUE LOS COMENTARIOS PUEDAN SER CALIFICADOS DESDE 1 ESTRELLA HASTA 5 ESTRELLAS)
-IMPLEMENTAR UN PANEL QUE CONTENGA: TOTAL DE COMENTARIOS, RAITING GENERAL DEL PROYECTO CON ESTRELLAS, MEJOR COMENTARIO (AÑADE MÁS FUNCIONES)

-ANIMACIÓN O UNA TRANSICIÓN PARA EL CAMBIO DE CAPYBARA AL TENER EL CURSOR SOBRE ÉL
-->
